server.port=8080

# DataSource - JWT_SECRET-style required vars; no localhost defaults in prod
spring.datasource.url=${PLANNER_DB_URL}
spring.datasource.username=${PLANNER_DB_USER}
spring.datasource.password=${PLANNER_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari connection pool - sized for small/medium deployment.
# Tune up after observing real concurrency; #83 will add metrics to make this evidence-based.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate - validate against Flyway-managed schema; never modify it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator - expose metrics on a separate management port
# (not reachable from public traffic on the main server port)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.server.port=9090
management.endpoint.health.show-details=when-authorized

# Logging - INFO root, no SQL or framework debug noise
logging.level.root=INFO
logging.level.com.echel=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# JWT - secret is REQUIRED via env var; placeholder resolution fails startup if missing.
# JwtSecretProductionGuard additionally rejects the dev default value when prod profile is active.
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000
