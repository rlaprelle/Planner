# Trust X-Forwarded-* headers from the TLS-terminating proxy / load balancer.
# Without this, Spring sees plaintext HTTP behind App Runner / nginx / Caddy and
# request.isSecure() returns false, causing browsers to drop Secure cookies
# (notably the refresh-token cookie) and silently breaking authentication.
# See HttpsTerminationGuard and docs/DEPLOYMENT.md.
server.forward-headers-strategy=framework
