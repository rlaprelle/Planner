server.port=8080

# DataSource - points to localhost for local dev outside Docker
spring.datasource.url=${PLANNER_DB_URL:jdbc:postgresql://localhost:5432/planner}
spring.datasource.username=${PLANNER_DB_USER:planner}
spring.datasource.password=${PLANNER_DB_PASSWORD:planner}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator - expose health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
