server.port=8080

# DataSource - points to localhost for local dev outside Docker
spring.datasource.url=${PLANNER_DB_URL:jdbc:postgresql://localhost:5432/planner}
spring.datasource.username=${PLANNER_DB_USER:planner}
spring.datasource.password=${PLANNER_DB_PASSWORD:planner}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator - expose health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# JWT
app.jwt.secret=${JWT_SECRET:your-very-long-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Email (account email-change verification).
#  provider=log  -> no-op sender that logs the verification link (dev/test default)
#  provider=ses  -> AWS SES (see application-prod.properties + docs/DEPLOYMENT.md)
app.email.provider=${EMAIL_PROVIDER:log}
app.email.from=${EMAIL_FROM:no-reply@echelplanner.local}
# Base URL the verification link points back to (the frontend /verify-email route).
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.account.email-change-token-ttl-minutes=60

# HTTP request-size limits (defense against oversized payloads).
# 64KB is comfortably above the largest legitimate single-field body in this app
# (task descriptions, reflection notes, deferred-item raw text — all TEXT columns
# but realistically far smaller). Multipart caps are forward-looking; no upload
# endpoints exist today.
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB
server.tomcat.max-http-form-post-size=64KB
server.tomcat.max-swallow-size=64KB
